name: Deploy → Dev / Staging

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: development
      url: ${{ steps.deploy.outputs.details_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ENVIRONMENT: development
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN_DEV }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_DEV }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_DEV }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID_DEV }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_DEV }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_DEV }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_DEV }}

      # Skips until FIREBASE_SERVICE_ACCOUNT_DEV + FIREBASE_PROJECT_ID_DEV are set.
      - name: Check deploy secrets
        id: check
        shell: bash
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          PID: ${{ secrets.FIREBASE_PROJECT_ID_DEV }}
        run: |
          if [ -n "$SA" ] && [ -n "$PID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Firebase deploy skipped::Set FIREBASE_SERVICE_ACCOUNT_DEV and FIREBASE_PROJECT_ID_DEV in repo Secrets to enable staging deploys."
          fi

      - name: Deploy to Firebase Hosting (live, on dev project)
        if: steps.check.outputs.ready == 'true'
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID_DEV }}
          channelId: live
