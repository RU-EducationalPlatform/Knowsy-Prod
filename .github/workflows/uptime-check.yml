# Uptime monitor for the live Knowsy-Prod deploy.
#
# Cron-fires every 5 minutes against the production hostname, expects a
# 200 + the sentinel string KNOWSY_HEALTH_OK in /health.html (see
# src/health.js). If the site is unreachable, drops a P1 Discord alert
# AND auto-files an urgent Linear ticket — with dedupe, so a 30-minute
# outage produces one ticket, not six.
#
# When the next successful probe lands, the workflow auto-resolves the
# open incident ticket and posts a recovery notice. Closing the loop in
# code keeps the on-call channel honest and the Linear board accurate
# without anyone having to remember to flip statuses.
#
# Required GitHub Actions secrets / variables
# -------------------------------------------
# secrets.LINEAR_API_KEY              org-wide Linear API key (write access
#                                     to the Knowsy team's issues)
# secrets.DISCORD_WEBHOOK_INCIDENTS   webhook for the #incidents channel
# vars.PROD_URL                       https://knowsy.example.com (no trailing /)
# vars.LINEAR_TEAM_ID                 UUID of the Knowsy team
# vars.LINEAR_LABEL_INCIDENT_ID       UUID of the "incident-uptime" label
# vars.LINEAR_STATE_DONE              UUID of the "Done" workflow state (reused
#                                     here to auto-resolve recovered incidents)
# vars.DISCORD_ONCALL_ROLE_ID         (optional) role to @-ping on incident
#
# Every step short-circuits with a workflow warning if its required
# secret/var isn't set — so the file can land before the wiring exists
# without spamming red runs.

name: Uptime check

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch: {}

concurrency:
  group: uptime-check
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Guard — PROD_URL set?
        id: guard
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          if [ -z "$PROD_URL" ]; then
            echo "::warning::vars.PROD_URL not set — skipping uptime check. Add it under Settings → Secrets and variables → Actions → Variables."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Probe /health.html
        if: steps.guard.outputs.ok == 'true'
        id: probe
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          set +e
          URL="${PROD_URL%/}/health.html"
          # Two-stage check: HTTP status THEN sentinel string. A 200 with
          # a broken bundle (white screen) still counts as down.
          STATUS=$(curl -sS -o /tmp/body.html -w '%{http_code}' --max-time 15 \
                   --retry 2 --retry-delay 5 --retry-connrefused "$URL" || echo "000")
          if [ "$STATUS" = "200" ] && grep -q 'KNOWSY_HEALTH_OK' /tmp/body.html; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "Probe OK — $URL returned 200 with sentinel."
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
            echo "http_code=$STATUS" >> "$GITHUB_OUTPUT"
            echo "::warning::Probe FAILED — $URL returned $STATUS (or sentinel missing)."
            head -c 400 /tmp/body.html || true
          fi

      # ------------------------------------------------------------------
      # DOWN: dedupe → create Linear issue → ping Discord
      # ------------------------------------------------------------------

      - name: Find existing open incident
        if: steps.probe.outputs.status == 'down'
        id: existing
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LABEL_ID: ${{ vars.LINEAR_LABEL_INCIDENT_ID }}
        run: |
          if [ -z "$LINEAR_API_KEY" ] || [ -z "$LABEL_ID" ]; then
            echo "::warning::LINEAR_API_KEY or LINEAR_LABEL_INCIDENT_ID not set — cannot dedupe; will create a ticket anyway."
            echo "open_id=" >> "$GITHUB_OUTPUT"
            echo "open_identifier=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PAYLOAD=$(jq -n --arg labelId "$LABEL_ID" '{
            query: "query Open($labelId:ID!){ issues(filter:{ labels:{ id:{ eq:$labelId } }, state:{ type:{ neq:\"completed\" } } }, first:5){ nodes{ id identifier } } }",
            variables: { labelId: $labelId }
          }')
          RESP=$(curl -fsS -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          OPEN_ID=$(echo "$RESP" | jq -r '.data.issues.nodes[0].id // empty')
          OPEN_IDENT=$(echo "$RESP" | jq -r '.data.issues.nodes[0].identifier // empty')
          if [ -n "$OPEN_ID" ]; then
            echo "Existing open incident: $OPEN_IDENT — skipping ticket creation."
          fi
          echo "open_id=$OPEN_ID" >> "$GITHUB_OUTPUT"
          echo "open_identifier=$OPEN_IDENT" >> "$GITHUB_OUTPUT"

      - name: Create Linear incident
        if: steps.probe.outputs.status == 'down' && steps.existing.outputs.open_id == ''
        id: create
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TEAM_ID: ${{ vars.LINEAR_TEAM_ID }}
          LABEL_ID: ${{ vars.LINEAR_LABEL_INCIDENT_ID }}
          PROD_URL: ${{ vars.PROD_URL }}
          HTTP_CODE: ${{ steps.probe.outputs.http_code }}
        run: |
          if [ -z "$LINEAR_API_KEY" ] || [ -z "$TEAM_ID" ]; then
            echo "::warning::LINEAR_API_KEY or LINEAR_TEAM_ID not set — cannot file ticket. Discord alert will still fire."
            echo "identifier=" >> "$GITHUB_OUTPUT"
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"
          TITLE="Site down — production unreachable ($NOW)"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(cat <<EOF
**Production probe failed.**

- URL: $PROD_URL/health.html
- HTTP status: \`$HTTP_CODE\`
- Detected at: $NOW
- Workflow run: $RUN_URL

This ticket was opened automatically by the uptime-check workflow.
It will auto-close when the next probe returns 200 + the
\`KNOWSY_HEALTH_OK\` sentinel.

**Triage steps**
1. Visit $PROD_URL/health.html in a browser. Does it render?
2. Check the most recent run of \`deploy-prod.yml\` — did a deploy fail?
3. Roll back via \`git revert\` on \`main\` if a bad deploy is the cause.
4. Otherwise check the Firebase Hosting status page and the Sentry
   dashboard for a flood of runtime errors.
EOF
)
          LABELS_JSON='[]'
          if [ -n "$LABEL_ID" ]; then
            LABELS_JSON=$(jq -n --arg id "$LABEL_ID" '[$id]')
          fi
          PAYLOAD=$(jq -n \
            --arg teamId "$TEAM_ID" \
            --arg title  "$TITLE" \
            --arg body   "$BODY" \
            --argjson labelIds "$LABELS_JSON" '{
            query: "mutation Create($input: IssueCreateInput!){ issueCreate(input:$input){ success issue { id identifier url } } }",
            variables: { input: { teamId: $teamId, title: $title, description: $body, priority: 1, labelIds: $labelIds } }
          }')
          RESP=$(curl -fsS -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "$RESP" | jq
          OK=$(echo "$RESP" | jq -r '.data.issueCreate.success // false')
          if [ "$OK" != "true" ]; then
            echo "::error::Linear issueCreate failed"
            exit 1
          fi
          IDENT=$(echo "$RESP" | jq -r '.data.issueCreate.issue.identifier')
          URL=$(echo "$RESP" | jq -r '.data.issueCreate.issue.url')
          echo "identifier=$IDENT" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Notify Discord — incident
        if: steps.probe.outputs.status == 'down'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_INCIDENTS }}
          ROLE: ${{ vars.DISCORD_ONCALL_ROLE_ID }}
          PROD_URL: ${{ vars.PROD_URL }}
          HTTP_CODE: ${{ steps.probe.outputs.http_code }}
          NEW_IDENT: ${{ steps.create.outputs.identifier }}
          NEW_URL: ${{ steps.create.outputs.url }}
          OPEN_IDENT: ${{ steps.existing.outputs.open_identifier }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_INCIDENTS not set — skipping notification."
            exit 0
          fi
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"
          MENTION=""
          if [ -n "$ROLE" ]; then
            MENTION="<@&$ROLE> "
          else
            MENTION="@here "
          fi
          if [ -n "$NEW_IDENT" ]; then
            TICKET_LINE="Linear: [$NEW_IDENT]($NEW_URL) — opened as Urgent."
          elif [ -n "$OPEN_IDENT" ]; then
            TICKET_LINE="Linear: existing incident $OPEN_IDENT still open (no new ticket created)."
          else
            TICKET_LINE="Linear: ticket creation skipped (missing config)."
          fi
          PAYLOAD=$(jq -n \
            --arg mention "$MENTION" \
            --arg url     "$PROD_URL/health.html" \
            --arg code    "$HTTP_CODE" \
            --arg when    "$NOW" \
            --arg ticket  "$TICKET_LINE" '
            {
              username: "Knowsy uptime",
              content: ($mention + "Production probe FAILED at " + $when),
              embeds: [{
                title: "Site down",
                description: $ticket,
                color: 15158332,
                fields: [
                  { name: "URL",         value: $url,  inline: false },
                  { name: "HTTP status", value: ("`" + $code + "`"), inline: true },
                  { name: "Detected",    value: $when, inline: true }
                ]
              }]
            }')
          curl -fsS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD" >/dev/null

      # ------------------------------------------------------------------
      # RECOVERED: auto-close open incident + post recovery notice
      # ------------------------------------------------------------------

      - name: Find incident to auto-resolve
        if: steps.probe.outputs.status == 'ok'
        id: recover_lookup
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LABEL_ID: ${{ vars.LINEAR_LABEL_INCIDENT_ID }}
        run: |
          if [ -z "$LINEAR_API_KEY" ] || [ -z "$LABEL_ID" ]; then
            echo "ids=" >> "$GITHUB_OUTPUT"
            echo "identifiers=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PAYLOAD=$(jq -n --arg labelId "$LABEL_ID" '{
            query: "query Open($labelId:ID!){ issues(filter:{ labels:{ id:{ eq:$labelId } }, state:{ type:{ neq:\"completed\" } } }, first:25){ nodes{ id identifier } } }",
            variables: { labelId: $labelId }
          }')
          RESP=$(curl -fsS -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          IDS=$(echo "$RESP" | jq -r '[.data.issues.nodes[].id] | @csv' | tr -d '"')
          IDENTS=$(echo "$RESP" | jq -r '[.data.issues.nodes[].identifier] | join(", ")')
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"
          echo "identifiers=$IDENTS" >> "$GITHUB_OUTPUT"
          if [ -n "$IDS" ]; then
            echo "Will auto-resolve: $IDENTS"
          fi

      - name: Auto-resolve recovered incident(s)
        if: steps.probe.outputs.status == 'ok' && steps.recover_lookup.outputs.ids != ''
        id: recover_close
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          DONE_STATE_ID: ${{ vars.LINEAR_STATE_DONE }}
          IDS_CSV: ${{ steps.recover_lookup.outputs.ids }}
        run: |
          if [ -z "$DONE_STATE_ID" ]; then
            echo "::warning::vars.LINEAR_STATE_DONE not set — cannot auto-resolve. Tickets left open."
            exit 0
          fi
          IFS=',' read -r -a IDS <<<"$IDS_CSV"
          for id in "${IDS[@]}"; do
            [ -z "$id" ] && continue
            PAYLOAD=$(jq -n --arg id "$id" --arg stateId "$DONE_STATE_ID" '{
              query: "mutation Close($id:String!,$stateId:String!){ issueUpdate(id:$id,input:{stateId:$stateId}){ success } }",
              variables: { id: $id, stateId: $stateId }
            }')
            curl -fsS -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" -H "Content-Type: application/json" \
              -d "$PAYLOAD" | jq -r '.data.issueUpdate.success' >/dev/null
          done
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Notify Discord — recovered
        if: steps.probe.outputs.status == 'ok' && steps.recover_lookup.outputs.ids != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_INCIDENTS }}
          PROD_URL: ${{ vars.PROD_URL }}
          IDENTS: ${{ steps.recover_lookup.outputs.identifiers }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_INCIDENTS not set — skipping recovery notification."
            exit 0
          fi
          NOW="$(date -u +'%Y-%m-%d %H:%M UTC')"
          PAYLOAD=$(jq -n \
            --arg url    "$PROD_URL/health.html" \
            --arg when   "$NOW" \
            --arg idents "$IDENTS" '
            {
              username: "Knowsy uptime",
              content: ("Production recovered at " + $when),
              embeds: [{
                title: "Site recovered",
                description: ("Auto-resolved " + $idents + "."),
                color: 3066993,
                fields: [
                  { name: "URL",      value: $url,  inline: false },
                  { name: "Restored", value: $when, inline: true }
                ]
              }]
            }')
          curl -fsS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD" >/dev/null
